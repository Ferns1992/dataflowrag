version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dataflowrag_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=dataflowrag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataflowrag_app
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/dataflowrag
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=dataflowrag
    volumes:
      - uploads:/app/uploads
    ports:
      - "4030:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  uploads:
