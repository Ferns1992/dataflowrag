version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dataflowrag_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=dataflowrag
    command: postgres -c shared_buffers=128MB -c max_connections=15 -c work_mem=8MB -c effective_cache_size=256MB -c maintenance_work_mem=64MB -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataflowrag_app
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/dataflowrag
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=dataflowrag
    volumes:
      - uploads:/app/uploads
    ports:
      - "4030:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 384M

volumes:
  postgres_data:
  uploads:
